services:
  - type: web
    name: trismegistus-hermes-live
    runtime: docker
    plan: free
    healthCheckPath: /api/health
    envVars:
      - key: TRISMEGISTUS_HOST
        value: 0.0.0.0
      - key: TRISMEGISTUS_NO_OPEN
        value: "1"
      - key: TRISMEGISTUS_ALLOW_OLLAMA_FALLBACK
        value: "0"
      - key: TRISMEGISTUS_HOSTED_DEMO
        value: "1"
      - key: TRISMEGISTUS_ENABLE_OPENCLAW
        value: "0"
      - key: TRISMEGISTUS_ENABLE_CPU_LLM
        value: "0"
      - key: TRISMEGISTUS_CPU_LLM_REPO
        value: bartowski/Hermes-3-Llama-3.2-3B-GGUF
      - key: TRISMEGISTUS_CPU_LLM_FILE
        value: Hermes-3-Llama-3.2-3B-IQ2_M.gguf
      - key: TRISMEGISTUS_CPU_LLM_TYPE
        value: llama
      - key: TRISMEGISTUS_CPU_LLM_THREADS
        value: "2"
      - key: TRISMEGISTUS_CPU_LLM_CONTEXT
        value: "1024"
      - key: TRISMEGISTUS_CPU_LLM_MAX_NEW_TOKENS
        value: "140"
      - key: TRISMEGISTUS_MODEL_TIMEOUT_SECONDS
        value: "120"
      - key: HERMES_TIMEOUT_SECONDS
        value: "20"
      - key: HERMES_BASE_URL
        sync: false
      - key: HERMES_MODEL
        sync: false
      - key: HERMES_API_KEY
        sync: false
      - key: NEMOCLAW_OPENAI_BASE_URL
        sync: false
      - key: NEMOCLAW_API_KEY
        sync: false
      - key: NEMOCLAW_PROVIDER_KEY
        sync: false
